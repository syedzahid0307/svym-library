name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # next build now runs the fail-fast env validation in lib/config.ts
    # (see lib/config.ts) at import time, which means CI needs *some*
    # value for every required var, even a fake one - real secrets
    # aren't needed to prove the app builds and type-checks cleanly.
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      IMAGEKIT_PRIVATE_KEY: ci-fake-private-key
      NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY: ci-fake-public-key
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/ci-fake
      UPSTASH_REDIS_URL: https://ci-fake.upstash.io
      UPSTASH_REDIS_TOKEN: ci-fake-token
      QSTASH_URL: https://ci-fake.qstash.io
      QSTASH_TOKEN: ci-fake-token
      RESEND_TOKEN: ci-fake-token
      CRON_SECRET: ci-fake-secret
      NEXT_PUBLIC_API_ENDPOINT: http://localhost:3000
      NEXT_PUBLIC_PROD_API_ENDPOINT: http://localhost:3000
      AUTH_SECRET: ci-fake-auth-secret-at-least-32-characters-long

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx eslint .

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
